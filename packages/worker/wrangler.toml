#:schema ../../node_modules/wrangler/config-schema.json

name = "surge-geosite"
main = "src/index.ts"
compatibility_date = "2026-02-15"
workers_dev = true
compatibility_flags = ["nodejs_compat"]
routes = [
  { pattern = "surge.bojin.co/geosite*", zone_name = "bojin.co" }
]

[observability]
enabled = true

[vars]
UPSTREAM_ZIP_URL = "https://github.com/plsy1/v2ray-rules-dat/archive/refs/heads/release.zip"
UPSTREAM_USER_AGENT = "surge-geosite-worker/2"
SRS_UPSTREAM_BASE_URL = "https://raw.githubusercontent.com/SagerNet/sing-geosite/rule-set"
SRS_UPSTREAM_USER_AGENT = "surge-geosite-worker/2"
SRS_CACHE_TTL_SECONDS = "86400"
MRS_UPSTREAM_BASE_URL = "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite"
MRS_UPSTREAM_USER_AGENT = "surge-geosite-worker/2"
MRS_CACHE_TTL_SECONDS = "86400"

[triggers]
crons = ["*/5 * * * *"]

[[r2_buckets]]
binding = "GEOSITE_BUCKET"
bucket_name = "surge-geosite"
preview_bucket_name = "surge-geosite"
