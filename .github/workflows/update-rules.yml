name: Update Geosite Rules

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout previous rules output
        run: |
          git fetch origin rules 2>/dev/null || true
          if git rev-parse --verify origin/rules >/dev/null 2>&1; then
            git worktree add ./prev-out origin/rules
          else
            mkdir -p ./prev-out
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI and Core
        run: pnpm run build

      - name: Download Upstream Geosite Data
        run: |
          curl -L -o release.zip https://github.com/plsy1/v2ray-rules-dat/archive/refs/heads/release.zip
          unzip release.zip -d temp_extracted
          mkdir -p ./domain-list-community
          mv temp_extracted/*/data ./domain-list-community/
          rm -rf release.zip temp_extracted

      - name: Compile All Rules
        run: |
          node ./packages/cli/dist/index.js build \
            --data-dir ./domain-list-community/data \
            --out-dir ./out

      - name: Diff and upload changed files to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          python3 << 'EOF'
          import filecmp, os, subprocess, sys

          PREV    = './prev-out'
          NEW     = './out'
          BUCKET   = os.environ['R2_BUCKET_NAME']
          ENDPOINT = f"https://{os.environ['R2_ACCOUNT_ID']}.r2.cloudflarestorage.com"

          def all_files(d):
              result = set()
              for root, _, files in os.walk(d):
                  for f in files:
                      result.add(os.path.relpath(os.path.join(root, f), d))
              return result

          prev_files = all_files(PREV)
          new_files  = all_files(NEW)

          to_upload = []
          to_delete = list(prev_files - new_files)

          # New files
          for f in new_files - prev_files:
              to_upload.append(f)

          # Modified files (compare by content, not mtime)
          for f in new_files & prev_files:
              if not filecmp.cmp(os.path.join(PREV, f), os.path.join(NEW, f), shallow=False):
                  to_upload.append(f)

          print(f"Upload: {len(to_upload)} files, Delete: {len(to_delete)} files")

          for f in to_upload:
              print(f"  + {f}")
              subprocess.run([
                  'aws', 's3', 'cp', os.path.join(NEW, f),
                  f's3://{BUCKET}/{f}',
                  '--endpoint-url', ENDPOINT, '--region', 'auto', '--no-progress'
              ], check=True)

          for f in to_delete:
              print(f"  - {f}")
              subprocess.run([
                  'aws', 's3', 'rm', f's3://{BUCKET}/{f}',
                  '--endpoint-url', ENDPOINT, '--region', 'auto'
              ], check=True)

          print("Done.")
          EOF

      - name: Push output to rules branch
        run: |
          git worktree remove ./prev-out --force 2>/dev/null || true

          cd ./out
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git checkout -b rules
          git add -A
          git commit -m "chore: update rules $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git push origin rules --force
