name: Seed Rules Branch

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI and Core
        run: pnpm run build

      - name: Download Upstream Geosite Data
        run: |
          curl -L -o release.zip https://github.com/plsy1/v2ray-rules-dat/archive/refs/heads/release.zip
          unzip release.zip -d temp_extracted
          mkdir -p ./domain-list-community
          mv temp_extracted/*/data ./domain-list-community/
          rm -rf release.zip temp_extracted

      - name: Compile All Rules
        run: |
          node ./packages/cli/dist/index.js build \
            --data-dir ./domain-list-community/data \
            --out-dir ./out

      - name: Push to rules branch
        run: |
          cd ./out
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git checkout -b rules
          git add -A
          git commit -m "chore: seed rules branch $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git push origin rules --force

          echo "Done. $(find . -type f | wc -l) files pushed to rules branch."
